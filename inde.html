<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <button id="theme-toggle" onclick="toggleTheme()" style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer" aria-label="Alternar tema">🌙</button>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponiveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/perfil-1.jpg" alt="Um personagem de aparência gótica e caricata, com cabelos roxos e monóculo, posa em um cenário fantástico de miniaturas sombrias iluminadas por velas.">
                                <figcaption>Gustavo</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/perfil-2.jpg" alt="Perfil 2">
                                <figcaption>Maria</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/Gemini_Generated_Image_6ounr26ounr26oun.png" alt="Perfil 3">
                                <figcaption>Enzo</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/Gemini_Generated_Image_xuf68ixuf68ixuf6.png   " alt="Perfil 4">
                                <figcaption>Maria</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
